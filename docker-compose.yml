services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syswatch-backend
    ports:
      - "3001:3001"
    pid: host
    privileged: true
    volumes:
      - /proc:/host_proc:ro
    environment:
      - PROC_PATH=/host_proc
      - SYSWATCH_INTERVAL=2

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: syswatch-dashboard
    ports:
      - "5173:80"
    depends_on:
      - backend
